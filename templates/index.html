<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRICK // {{ device.name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0c0f;
            --surface: #0e1116;
            --surface2: #141820;
            --surface3: #0c1a14;
            --border: #1e2530;
            --border-bright: #2a3545;
            --accent: #00e5a0;
            --accent-dim: #00a87088;
            --accent-glow: #00e5a022;
            --tool-accent: #f0b429;
            --tool-accent-dim: #f0b42944;
            --tool-border: #2a2010;
            --tool-surface: #0c100a;
            --danger: #ff4455;
            --muted: #4a5568;
            --text: #c8d6e5;
            --text-dim: #6b7a8d;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Barlow', sans-serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.6;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 1000;
        }

        /* ── Layout ── */
        .shell {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
        }

        .wordmark {
            font-family: var(--mono);
            font-size: 18px;
            letter-spacing: 0.25em;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-dim);
        }

        .wordmark span {
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 0.1em;
            margin-left: 10px;
        }

        .device-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        .device-tag .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-ghost {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-ghost:hover {
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        /* ── Messages ── */
        .messages {
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg {
            display: flex;
            gap: 12px;
        }

        .msg-role {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            padding-top: 3px;
            min-width: 52px;
            flex-shrink: 0;
        }

        .msg.user .msg-role {
            color: var(--text-dim);
        }

        .msg.assistant .msg-role {
            color: var(--accent);
        }

        .msg-body {
            flex: 1;
            min-width: 0;
        }

        .msg.user .msg-body {
            color: var(--text-dim);
            font-size: 13px;
        }

        .msg.assistant .msg-body {
            color: var(--text);
        }

        /* Markdown */
        .msg-body code {
            font-family: var(--mono);
            font-size: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 1px 5px;
            color: var(--accent);
        }

        .msg-body pre {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: 2px solid var(--accent-dim);
            padding: 12px 14px;
            font-family: var(--mono);
            font-size: 12px;
            overflow-x: auto;
            margin: 8px 0;
            line-height: 1.5;
            color: #a8c4d8;
        }

        .msg-body p {
            margin-bottom: 0.6em;
        }

        .msg-body p:last-child {
            margin-bottom: 0;
        }

        .msg-body ul,
        .msg-body ol {
            padding-left: 1.4em;
            margin-bottom: 0.6em;
        }

        .msg-body li {
            margin-bottom: 0.2em;
        }

        .msg-body h1,
        .msg-body h2,
        .msg-body h3 {
            font-family: var(--mono);
            color: var(--accent);
            margin: 0.8em 0 0.3em;
            letter-spacing: 0.08em;
        }

        .msg-body h1 {
            font-size: 15px;
        }

        .msg-body h2 {
            font-size: 14px;
        }

        .msg-body h3 {
            font-size: 13px;
        }

        .msg-body table {
            border-collapse: collapse;
            font-size: 12px;
            font-family: var(--mono);
            margin: 8px 0;
            width: 100%;
        }

        .msg-body th {
            background: var(--surface2);
            color: var(--accent);
            padding: 4px 10px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .msg-body td {
            padding: 3px 10px;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .msg-body blockquote {
            border-left: 2px solid var(--accent-dim);
            margin: 6px 0;
            padding: 4px 12px;
            color: var(--text-dim);
            font-style: italic;
        }

        .msg-body strong {
            color: var(--text);
        }

        .msg-body a {
            color: var(--accent);
            text-decoration: none;
        }

        .msg-body a:hover {
            text-decoration: underline;
        }

        /* ── Tool strip ── */
        .tool-strip {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-left: 64px;
            /* aligns with msg-body */
        }

        /* ── Tool pill (accordion) ── */
        .tool-pill {
            display: flex;
            flex-direction: column;
            background: var(--tool-surface);
            border: 1px solid var(--tool-border);
            border-left: 2px solid var(--tool-accent);
            font-family: var(--mono);
            font-size: 10px;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .tool-pill.pending {
            border-left-color: var(--muted);
            opacity: 0.7;
        }

        .tool-pill.running {
            border-left-color: var(--tool-accent);
        }

        .tool-pill.done {
            border-left-color: #28c840;
        }

        .tool-pill.error {
            border-left-color: var(--danger);
        }

        /* Pill header — always visible, clickable */
        .tool-pill-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 10px;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .tool-pill-header:hover {
            background: rgba(240, 180, 41, 0.05);
        }

        .tool-status-icon {
            font-size: 11px;
            width: 14px;
            text-align: center;
            flex-shrink: 0;
        }

        /* Spinner for running state */
        .tool-spinner {
            width: 10px;
            height: 10px;
            border: 1.5px solid var(--tool-border);
            border-top-color: var(--tool-accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .tool-pill-name {
            color: var(--tool-accent);
            letter-spacing: 0.05em;
            flex: 1;
        }

        .tool-pill.done .tool-pill-name {
            color: #28c840;
        }

        .tool-pill.error .tool-pill-name {
            color: var(--danger);
        }

        .tool-pill.pending .tool-pill-name {
            color: var(--muted);
        }

        .tool-pill-chevron {
            font-size: 9px;
            color: var(--muted);
            transition: transform 0.2s;
            margin-left: auto;
        }

        .tool-pill.open .tool-pill-chevron {
            transform: rotate(180deg);
        }

        /* Accordion body */
        .tool-pill-body {
            display: none;
            border-top: 1px solid var(--tool-border);
        }

        .tool-pill.open .tool-pill-body {
            display: block;
        }

        .tool-section {
            padding: 8px 12px;
            border-bottom: 1px solid var(--tool-border);
        }

        .tool-section:last-child {
            border-bottom: none;
        }

        .tool-section-label {
            font-size: 9px;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .tool-section-content {
            font-size: 10px;
            color: #a8c4d8;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .tool-section-content::-webkit-scrollbar {
            width: 3px;
        }

        .tool-section-content::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        /* ── Typing indicator ── */
        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding-top: 4px;
        }

        .typing .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 1.2s ease-in-out infinite;
        }

        .typing .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2
            }

            40% {
                opacity: 1
            }
        }

        /* Streaming cursor */
        .stream-cursor {
            display: inline-block;
            width: 7px;
            height: 13px;
            background: var(--accent);
            vertical-align: middle;
            margin-left: 1px;
            animation: blink-cursor 0.9s step-end infinite;
        }

        @keyframes blink-cursor {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        /* ── Input area ── */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            position: relative;
        }

        .input-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .input-prefix {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--accent);
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 8px 12px;
            resize: none;
            min-height: 42px;
            max-height: 160px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.15s;
            overflow-y: auto;
        }

        textarea:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 1px var(--accent-glow);
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: #000;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .send-btn:hover {
            filter: brightness(1.15);
        }

        .send-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .hint {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: 8px;
        }

        /* ── Empty state ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 8px;
            opacity: 0.4;
        }

        .empty-state .big {
            font-family: var(--mono);
            font-size: 48px;
            color: var(--accent);
            letter-spacing: 0.1em;
            line-height: 1;
        }

        .empty-state p {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.15em;
        }
    </style>
</head>

<body>
    <div class="shell">
        <header>
            <div class="wordmark">BRICK <span>// SYSADMIN ASSISTANT</span></div>
            <div class="device-tag">
                <div class="dot"></div>
                {{ device.name }}
            </div>
            <div class="header-actions">
                <button class="btn-ghost" onclick="clearHistory()">CLR</button>
            </div>
        </header>

        <div class="messages" id="messages">
            <div class="empty-state" id="emptyState">
                <div class="big">█</div>
                <p>WAITING FOR INPUT, BOSS.</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <div class="input-prefix">&gt;</div>
                <textarea id="input" placeholder="What's the situation..." rows="1" autofocus></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
            </div>
            <div class="hint">enter to send &nbsp;·&nbsp; shift+enter for newline</div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        // ── Tool metadata ─────────────────────────────────────────────────────────────
        const TOOL_META = {
            get_cpu_usage: { icon: '⚙', label: 'CPU Usage' },
            get_memory_usage: { icon: '🧠', label: 'Memory' },
            get_disk_usage: { icon: '💾', label: 'Disk Usage' },
            get_system_info: { icon: '🖥', label: 'System Info' },
            get_temperatures: { icon: '🌡', label: 'Temperatures' },
            get_inode_usage: { icon: '📁', label: 'Inode Usage' },
            list_processes: { icon: '📋', label: 'List Processes' },
            search_process: { icon: '🔍', label: 'Search Process' },
            kill_process: { icon: '🔴', label: 'Kill Process' },
            set_process_priority: { icon: '⚖', label: 'Set Priority' },
            get_connections: { icon: '🔌', label: 'Connections' },
            ping_host: { icon: '📡', label: 'Ping Host' },
            get_network_io: { icon: '📶', label: 'Network I/O' },
            tail_log: { icon: '📜', label: 'Tail Log' },
            find_large_files: { icon: '🗂', label: 'Find Large Files' },
            list_directory: { icon: '📂', label: 'List Dir' },
            list_services: { icon: '⚡', label: 'List Services' },
            get_service_status: { icon: '🔧', label: 'Service Status' },
            get_login_history: { icon: '👤', label: 'Login History' },
            get_cron_jobs: { icon: '🕐', label: 'Cron Jobs' },
        };
        function toolMeta(name) { return TOOL_META[name] || { icon: '🔧', label: name }; }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function formatParams(params) {
            if (!params || typeof params !== 'object') return '';
            const entries = Object.entries(params);
            if (entries.length === 0) return '(no parameters)';
            return entries.map(([k, v]) => `${k}: ${JSON.stringify(v)}`).join('\n');
        }

        // ── Tool pill factory ─────────────────────────────────────────────────────────
        function createToolPill(name, params) {
            const meta = toolMeta(name);
            const pill = document.createElement('div');
            pill.className = 'tool-pill running';
            pill.dataset.toolName = name;

            // Header
            const header = document.createElement('div');
            header.className = 'tool-pill-header';

            const spinner = document.createElement('div');
            spinner.className = 'tool-spinner';

            const nameEl = document.createElement('span');
            nameEl.className = 'tool-pill-name';
            nameEl.textContent = `${meta.label}`;

            const chevron = document.createElement('span');
            chevron.className = 'tool-pill-chevron';
            chevron.textContent = '▾';

            header.appendChild(spinner);
            header.appendChild(nameEl);
            header.appendChild(chevron);

            // Body (accordion)
            const body = document.createElement('div');
            body.className = 'tool-pill-body';

            // Params section
            const paramsSection = document.createElement('div');
            paramsSection.className = 'tool-section';
            paramsSection.innerHTML = `<div class="tool-section-label">PARAMETERS</div><div class="tool-section-content">${escapeHtml(formatParams(params))}</div>`;

            // Result section (placeholder while running)
            const resultSection = document.createElement('div');
            resultSection.className = 'tool-section';
            resultSection.innerHTML = `<div class="tool-section-label">RESULT</div><div class="tool-section-content result-content"><span style="color:var(--muted);font-style:italic">executing…</span></div>`;

            body.appendChild(paramsSection);
            body.appendChild(resultSection);
            pill.appendChild(header);
            pill.appendChild(body);

            // Toggle accordion on header click
            header.addEventListener('click', () => {
                pill.classList.toggle('open');
            });

            return pill;
        }

        function finishToolPill(pill, result, isError = false) {
            // Swap spinner → icon
            const spinner = pill.querySelector('.tool-spinner');
            if (spinner) {
                const icon = document.createElement('span');
                icon.className = 'tool-status-icon';
                icon.textContent = isError ? '✗' : '✓';
                icon.style.color = isError ? 'var(--danger)' : '#28c840';
                spinner.replaceWith(icon);
            }

            // Update state class
            pill.classList.remove('running');
            pill.classList.add(isError ? 'error' : 'done');

            // Fill result content
            const resultContent = pill.querySelector('.result-content');
            if (resultContent) {
                // Try to pretty-print JSON
                let display = result;
                try {
                    const parsed = JSON.parse(result);
                    display = JSON.stringify(parsed, null, 2);
                } catch (_) { }
                resultContent.textContent = display;
            }
        }

        // ── Message builders ──────────────────────────────────────────────────────────
        function appendUserMessage(content) {
            document.getElementById('emptyState')?.remove();
            const group = document.createElement('div');
            group.className = 'msg-group';
            group.appendChild(buildMsgEl('user', content));
            messagesEl.appendChild(group);
            scrollBottom();
            return group;
        }

        function buildMsgEl(role, content) {
            const msg = document.createElement('div');
            msg.className = `msg ${role}`;
            const roleLabel = document.createElement('div');
            roleLabel.className = 'msg-role';
            roleLabel.textContent = role === 'user' ? 'YOU' : 'BRICK';
            const body = document.createElement('div');
            body.className = 'msg-body';
            if (role === 'assistant') {
                body.innerHTML = marked.parse(content || '');
            } else {
                body.textContent = content;
            }
            msg.appendChild(roleLabel);
            msg.appendChild(body);
            return msg;
        }

        function scrollBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // ── Load history ──────────────────────────────────────────────────────────────
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                if (data.history && data.history.length > 0) {
                    document.getElementById('emptyState')?.remove();
                    data.history.forEach(m => {
                        if (m.role === 'user') appendUserMessage(m.content);
                        else if (m.role === 'assistant') {
                            const group = document.createElement('div');
                            group.className = 'msg-group';
                            group.style.animation = 'none';
                            group.appendChild(buildMsgEl('assistant', m.content));
                            messagesEl.appendChild(group);
                        }
                    });
                    scrollBottom();
                }
            } catch (e) {
                console.error('Failed to load history', e);
            }
        }

        // ── Send message (SSE streaming) ──────────────────────────────────────────────
        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            inputEl.value = '';
            autoResize();
            sendBtn.disabled = true;

            document.getElementById('emptyState')?.remove();
            appendUserMessage(message);

            // Create the assistant group that will fill in live
            const group = document.createElement('div');
            group.className = 'msg-group';
            messagesEl.appendChild(group);

            // Tool strip container
            const toolStrip = document.createElement('div');
            toolStrip.className = 'tool-strip';
            group.appendChild(toolStrip);

            // Assistant bubble
            const assistantMsg = document.createElement('div');
            assistantMsg.className = 'msg assistant';
            const roleLabel = document.createElement('div');
            roleLabel.className = 'msg-role';
            roleLabel.textContent = 'BRICK';
            const bodyEl = document.createElement('div');
            bodyEl.className = 'msg-body';

            // Show thinking dots initially
            bodyEl.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            assistantMsg.appendChild(roleLabel);
            assistantMsg.appendChild(bodyEl);
            group.appendChild(assistantMsg);
            scrollBottom();

            // Track streaming state
            let streamingStarted = false;
            let fullText = '';
            let cursor = null;
            const activePills = new Map(); // name → pill element

            function startStreaming() {
                if (streamingStarted) return;
                streamingStarted = true;
                bodyEl.innerHTML = '';
                cursor = document.createElement('span');
                cursor.className = 'stream-cursor';
                bodyEl.appendChild(cursor);
            }

            function appendToken(text) {
                startStreaming();
                fullText += text;
                // Remove cursor, append text, re-add cursor at the end
                if (cursor && cursor.parentNode) cursor.remove();
                bodyEl.appendChild(document.createTextNode(text));
                if (cursor) bodyEl.appendChild(cursor);
                scrollBottom();
            }

            function finalizeText() {
                if (cursor) cursor.remove();
                bodyEl.innerHTML = marked.parse(fullText || '…');
            }

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });

                if (!response.ok) {
                    bodyEl.innerHTML = `<span style="color:var(--danger)">[HTTP ${response.status}]</span>`;
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // hold incomplete line

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        let event;
                        try { event = JSON.parse(line.slice(6)); }
                        catch (_) { continue; }

                        switch (event.type) {
                            case 'tool_start': {
                                // Remove thinking dots if still showing
                                const thinking = bodyEl.querySelector('.typing');
                                if (thinking) thinking.remove();

                                const pill = createToolPill(event.name, event.parameters);
                                toolStrip.appendChild(pill);
                                activePills.set(event.name, pill);
                                scrollBottom();
                                break;
                            }

                            case 'tool_result': {
                                const pill = activePills.get(event.name);
                                if (pill) {
                                    const isError = (event.result || '').startsWith('[');
                                    finishToolPill(pill, event.result, isError);
                                }
                                scrollBottom();
                                break;
                            }

                            case 'token': {
                                // Remove thinking dots on first token
                                const thinking = bodyEl.querySelector('.typing');
                                if (thinking) thinking.remove();
                                appendToken(event.text);
                                break;
                            }

                            case 'error': {
                                finalizeText();
                                bodyEl.innerHTML += `<span style="color:var(--danger)"> [Error: ${escapeHtml(event.message)}]</span>`;
                                break;
                            }

                            case 'done': {
                                finalizeText();
                                scrollBottom();
                                break;
                            }
                        }
                    }
                }

                // Ensure finalized even if 'done' event was missed
                if (!streamingStarted) {
                    bodyEl.innerHTML = marked.parse(fullText || '…');
                } else {
                    finalizeText();
                }

            } catch (e) {
                bodyEl.innerHTML = `<span style="color:var(--danger)">[Connection error: ${escapeHtml(e.message)}]</span>`;
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
                scrollBottom();
            }
        }

        // ── Reset ─────────────────────────────────────────────────────────────────────
        async function clearHistory() {
            if (!confirm('Clear conversation history?')) return;
            await fetch('/api/reset', { method: 'POST' });
            messagesEl.innerHTML = `
        <div class="empty-state" id="emptyState">
            <div class="big">█</div>
            <p>SESSION CLEARED. WAITING FOR INPUT, BOSS.</p>
        </div>`;
        }

        // ── Textarea auto-resize ──────────────────────────────────────────────────────
        function autoResize() {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
        }
        inputEl.addEventListener('input', autoResize);
        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        loadHistory();
    </script>
</body>

</html>
