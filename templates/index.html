<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRICK // {{ device.name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0c0f;
            --surface: #0e1116;
            --surface2: #141820;
            --surface3: #0c1a14;
            --border: #1e2530;
            --border-bright: #2a3545;
            --accent: #00e5a0;
            --accent-dim: #00a87088;
            --accent-glow: #00e5a022;
            --tool-accent: #f0b429;
            --tool-accent-dim: #f0b42944;
            --tool-border: #2a2010;
            --danger: #ff4455;
            --muted: #4a5568;
            --text: #c8d6e5;
            --text-dim: #6b7a8d;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Barlow', sans-serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.6;
            overflow: hidden;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 1000;
        }

        /* Layout */
        .shell {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
        }

        .wordmark {
            font-family: var(--mono);
            font-size: 18px;
            letter-spacing: 0.25em;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-dim);
        }

        .wordmark span {
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 0.1em;
            margin-left: 10px;
        }

        .device-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        .device-tag .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-ghost {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-ghost:hover {
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        /* Messages */
        .messages {
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        /* Message group: tool strip + assistant bubble sit together */
        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg {
            display: flex;
            gap: 12px;
        }

        .msg-role {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            padding-top: 3px;
            min-width: 52px;
            flex-shrink: 0;
        }

        .msg.user .msg-role {
            color: var(--text-dim);
        }

        .msg.assistant .msg-role {
            color: var(--accent);
        }

        .msg-body {
            flex: 1;
            min-width: 0;
        }

        .msg.user .msg-body {
            color: var(--text-dim);
            font-size: 13px;
        }

        .msg.assistant .msg-body {
            color: var(--text);
        }

        /* Markdown-ish styling */
        .msg-body code {
            font-family: var(--mono);
            font-size: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 1px 5px;
            color: var(--accent);
        }

        .msg-body pre {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: 2px solid var(--accent-dim);
            padding: 12px 14px;
            font-family: var(--mono);
            font-size: 12px;
            overflow-x: auto;
            margin: 8px 0;
            line-height: 1.5;
            color: #a8c4d8;
        }

        /* ── Tool call strip ───────────────────────────────────────── */
        .tool-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding-left: 64px;
            /* aligns with msg-body (52px role + 12px gap) */
        }

        .tool-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface3);
            border: 1px solid var(--tool-border);
            border-left: 2px solid var(--tool-accent);
            padding: 3px 10px 3px 8px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--tool-accent);
            letter-spacing: 0.05em;
            cursor: default;
            transition: background 0.15s, border-color 0.15s;
            position: relative;
        }

        .tool-pill:hover {
            background: #0f2218;
            border-color: var(--tool-accent);
        }

        .tool-pill .tool-icon {
            font-size: 11px;
            opacity: 0.8;
        }

        .tool-pill .tool-name {
            color: var(--tool-accent);
        }

        /* Params tooltip on hover */
        .tool-pill .tool-params {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            z-index: 50;
            background: #0e1510;
            border: 1px solid var(--tool-accent);
            padding: 8px 12px;
            font-size: 10px;
            color: #c8d6e5;
            white-space: pre;
            min-width: 180px;
            max-width: 360px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            line-height: 1.6;
        }

        .tool-pill:hover .tool-params {
            display: block;
        }

        /* tiny triangle */
        .tool-pill .tool-params::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 14px;
            border: 5px solid transparent;
            border-top-color: var(--tool-accent);
        }

        /* Typing indicator */
        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding-top: 4px;
        }

        .typing .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 1.2s ease-in-out infinite;
        }

        .typing .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2;
            }

            40% {
                opacity: 1;
            }
        }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            position: relative;
        }

        .input-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .input-prefix {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--accent);
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 8px 12px;
            resize: none;
            min-height: 42px;
            max-height: 160px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.15s;
            overflow-y: auto;
        }

        textarea:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 1px var(--accent-glow);
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: #000;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .send-btn:hover {
            filter: brightness(1.15);
        }

        .send-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .hint {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: 8px;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 8px;
            opacity: 0.4;
        }

        .empty-state .big {
            font-family: var(--mono);
            font-size: 48px;
            color: var(--accent);
            letter-spacing: 0.1em;
            line-height: 1;
        }

        .empty-state p {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.15em;
        }
    </style>
</head>

<body>
    <div class="shell">
        <header>
            <div class="wordmark">BRICK <span>// SYSADMIN ASSISTANT</span></div>
            <div class="device-tag">
                <div class="dot"></div>
                {{ device.name }}
            </div>
            <div class="header-actions">
                <button class="btn-ghost" onclick="clearHistory()">CLR</button>
            </div>
        </header>

        <div class="messages" id="messages">
            <div class="empty-state" id="emptyState">
                <div class="big">█</div>
                <p>WAITING FOR INPUT, BOSS.</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <div class="input-prefix">&gt;</div>
                <textarea id="input" placeholder="What's the situation..." rows="1" autofocus></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
            </div>
            <div class="hint">enter to send &nbsp;·&nbsp; shift+enter for newline</div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        // ── Tool name → display label + icon mapping ──────────────────
        const TOOL_META = {
            get_cpu_usage: { icon: '⚙', label: 'CPU Usage' },
            get_memory_usage: { icon: '🧠', label: 'Memory' },
            get_disk_usage: { icon: '💾', label: 'Disk Usage' },
            get_system_info: { icon: '🖥', label: 'System Info' },
            get_temperatures: { icon: '🌡', label: 'Temperatures' },
            get_inode_usage: { icon: '📁', label: 'Inode Usage' },
            list_processes: { icon: '📋', label: 'List Processes' },
            search_process: { icon: '🔍', label: 'Search Process' },
            kill_process: { icon: '🔴', label: 'Kill Process' },
            set_process_priority: { icon: '⚖', label: 'Set Priority' },
            get_connections: { icon: '🔌', label: 'Connections' },
            ping_host: { icon: '📡', label: 'Ping Host' },
            get_network_io: { icon: '📶', label: 'Network I/O' },
            tail_log: { icon: '📜', label: 'Tail Log' },
            find_large_files: { icon: '🗂', label: 'Find Large Files' },
            list_directory: { icon: '📂', label: 'List Dir' },
            list_services: { icon: '⚡', label: 'List Services' },
            get_service_status: { icon: '🔧', label: 'Service Status' },
            get_login_history: { icon: '👤', label: 'Login History' },
            get_cron_jobs: { icon: '🕐', label: 'Cron Jobs' },
        };

        function toolMeta(name) {
            return TOOL_META[name] || { icon: '🔧', label: name };
        }

        // Format params as readable key: value lines
        function formatParams(params) {
            if (!params || typeof params !== 'object') return '';
            const entries = Object.entries(params);
            if (entries.length === 0) return '(no parameters)';
            return entries.map(([k, v]) => `${k}: ${JSON.stringify(v)}`).join('\n');
        }

        // ── Render a tool strip (array of {name, parameters}) ─────────
        function buildToolStrip(toolCalls) {
            if (!toolCalls || toolCalls.length === 0) return null;
            const strip = document.createElement('div');
            strip.className = 'tool-strip';

            toolCalls.forEach(tc => {
                const meta = toolMeta(tc.name);
                const params = formatParams(tc.parameters);

                const pill = document.createElement('div');
                pill.className = 'tool-pill';
                pill.innerHTML = `
                    <span class="tool-icon">${meta.icon}</span>
                    <span class="tool-name">${meta.label}</span>
                    ${params ? `<div class="tool-params">${escapeHtml(params)}</div>` : ''}
                `;
                strip.appendChild(pill);
            });
            return strip;
        }

        // ── Core message rendering ─────────────────────────────────────
        function appendUserMessage(content) {
            document.getElementById('emptyState')?.remove();
            const group = document.createElement('div');
            group.className = 'msg-group';
            group.appendChild(buildMsgEl('user', content));
            messagesEl.appendChild(group);
        }

        function appendAssistantMessage(content, toolCalls, animate = true) {
            document.getElementById('emptyState')?.remove();

            const group = document.createElement('div');
            group.className = 'msg-group';
            if (!animate) group.style.animation = 'none';

            // Tool strip first
            const strip = buildToolStrip(toolCalls);
            if (strip) group.appendChild(strip);

            // Then the assistant bubble
            group.appendChild(buildMsgEl('assistant', content));
            messagesEl.appendChild(group);
        }

        function buildMsgEl(role, content) {
            const msg = document.createElement('div');
            msg.className = `msg ${role}`;

            const roleLabel = document.createElement('div');
            roleLabel.className = 'msg-role';
            roleLabel.textContent = role === 'user' ? 'YOU' : 'BRICK';

            const body = document.createElement('div');
            body.className = 'msg-body';
            body.innerHTML = formatContent(content);

            msg.appendChild(roleLabel);
            msg.appendChild(body);
            return msg;
        }

        function formatContent(text) {
            text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
                `<pre>${escapeHtml(code.trim())}</pre>`
            );
            text = text.replace(/`([^`]+)`/g, (_, code) =>
                `<code>${escapeHtml(code)}</code>`
            );
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        // ── Typing indicator ──────────────────────────────────────────
        function showTyping() {
            const group = document.createElement('div');
            group.className = 'msg-group';
            group.id = 'typing';

            const msg = document.createElement('div');
            msg.className = 'msg assistant';

            const roleLabel = document.createElement('div');
            roleLabel.className = 'msg-role';
            roleLabel.textContent = 'BRICK';

            const body = document.createElement('div');
            body.className = 'msg-body';
            body.innerHTML = `<div class="typing">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>`;

            msg.appendChild(roleLabel);
            msg.appendChild(body);
            group.appendChild(msg);
            messagesEl.appendChild(group);
            scrollBottom();
            return group;
        }

        function scrollBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // ── Load history on start ─────────────────────────────────────
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                if (data.history && data.history.length > 0) {
                    document.getElementById('emptyState')?.remove();
                    // History has no tool_calls metadata; render without strip
                    data.history.forEach(m => {
                        if (m.role === 'user') {
                            appendUserMessage(m.content);
                        } else if (m.role === 'assistant') {
                            appendAssistantMessage(m.content, [], false);
                        }
                    });
                    scrollBottom();
                }
            } catch (e) {
                console.error('Failed to load history', e);
            }
        }

        // ── Send message ──────────────────────────────────────────────
        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            inputEl.value = '';
            autoResize();
            sendBtn.disabled = true;

            appendUserMessage(message);
            scrollBottom();

            const typingEl = showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });
                const data = await res.json();
                typingEl.remove();
                appendAssistantMessage(
                    data.reply || data.error || '...',
                    data.tool_calls || []
                );
            } catch (e) {
                typingEl.remove();
                appendAssistantMessage(`[Connection error: ${e.message}]`, []);
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
                scrollBottom();
            }
        }

        // ── Reset ─────────────────────────────────────────────────────
        async function clearHistory() {
            if (!confirm('Clear conversation history?')) return;
            await fetch('/api/reset', { method: 'POST' });
            messagesEl.innerHTML = `
                <div class="empty-state" id="emptyState">
                    <div class="big">█</div>
                    <p>SESSION CLEARED. WAITING FOR INPUT, BOSS.</p>
                </div>`;
        }

        // ── Textarea auto-resize ──────────────────────────────────────
        function autoResize() {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
        }
        inputEl.addEventListener('input', autoResize);
        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        loadHistory();
    </script>
</body>

</html>
